# NOC Pharma QMS — Docker Compose
# Run: docker compose up -d

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: noc-pharma-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: noc_qms
      POSTGRES_USER: noc_pharma
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password_change_me}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noc_pharma -d noc_qms"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: noc-pharma-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://noc_pharma:${DB_PASSWORD:-dev_password_change_me}@db:5432/noc_qms
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret-change-in-production}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  # pgAdmin for DB management (dev only)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: noc-pharma-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@noc-pharma.de
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - db
    profiles:
      - dev

volumes:
  pgdata:
  uploads:
